<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Krishna Agarwal hero banner</title>
  <desc id="desc">Animated futuristic GitHub profile hero with aurora lighting, moving grid, particles, and large typography.</desc>
  <style>
    @keyframes gridSlide { from { transform: translateY(0); } to { transform: translateY(48px); } }
    @keyframes auroraShift { 0%,100% { transform: translate3d(0,0,0) scale(1); opacity: .58; } 50% { transform: translate3d(38px,-18px,0) scale(1.08); opacity: .84; } }
    @keyframes floatSoft { 0%,100% { transform: translateY(0); opacity: .4; } 50% { transform: translateY(-18px); opacity: .9; } }
    @keyframes pulse { 0%,100% { opacity: .35; r: 4; } 50% { opacity: 1; r: 7; } }
    @keyframes sweep { from { transform: translateX(-420px) rotate(12deg); opacity: 0; } 30% { opacity: .45; } to { transform: translateX(1080px) rotate(12deg); opacity: 0; } }
    @keyframes dash { to { stroke-dashoffset: -140; } }
    .grid { animation: gridSlide 10s linear infinite; }
    .aurora-a { animation: auroraShift 8s ease-in-out infinite; transform-origin: 50% 50%; }
    .aurora-b { animation: auroraShift 11s ease-in-out infinite reverse; transform-origin: 50% 50%; }
    .particle { animation: floatSoft 7s ease-in-out infinite; }
    .particle:nth-of-type(2n) { animation-duration: 9s; animation-delay: -2s; }
    .particle:nth-of-type(3n) { animation-duration: 12s; animation-delay: -5s; }
    .online { animation: pulse 1.8s ease-in-out infinite; }
    .orbit { stroke-dasharray: 16 18; animation: dash 9s linear infinite; }
    .sweep { animation: sweep 6s ease-in-out infinite; }
    text { font-family: Inter, "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset=".52" stop-color="#101722"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="border" x1="61" y1="54" x2="1139" y2="466" gradientUnits="userSpaceOnUse">
      <stop stop-color="#79C0FF" stop-opacity=".9"/>
      <stop offset=".45" stop-color="#30363D" stop-opacity=".45"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity=".85"/>
    </linearGradient>
    <radialGradient id="aurora1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 150) rotate(35) scale(430 160)">
      <stop stop-color="#79C0FF" stop-opacity=".9"/>
      <stop offset=".45" stop-color="#58A6FF" stop-opacity=".36"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 330) rotate(-22) scale(440 190)">
      <stop stop-color="#F0F6FC" stop-opacity=".38"/>
      <stop offset=".38" stop-color="#79C0FF" stop-opacity=".3"/>
      <stop offset="1" stop-color="#79C0FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridPattern" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#30363D" stroke-opacity=".42" stroke-width="1"/>
      <path d="M12 0V48M24 0V48M36 0V48M0 12H48M0 24H48M0 36H48" stroke="#30363D" stroke-opacity=".13" stroke-width=".8"/>
    </pattern>
    <filter id="blur40" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.65 0 0 0 0 1 0 0 0 .85 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="3" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .075"/>
      </feComponentTransfer>
    </filter>
    <clipPath id="clip">
      <rect x="54" y="44" width="1092" height="432" rx="34"/>
    </clipPath>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <rect width="1200" height="520" filter="url(#noise)" opacity=".55"/>
  <g clip-path="url(#clip)">
    <g class="grid">
      <rect x="0" y="-96" width="1200" height="720" fill="url(#gridPattern)"/>
    </g>
    <path class="aurora-a" d="M-10 151C166 66 250 158 404 111C587 55 649 26 812 96C957 158 1056 145 1218 90V-12H-10V151Z" fill="url(#aurora1)" filter="url(#blur40)"/>
    <path class="aurora-b" d="M1194 414C1024 462 891 369 737 412C559 461 461 515 290 450C171 405 76 411 -31 474V540H1194V414Z" fill="url(#aurora2)" filter="url(#blur40)"/>
    <rect class="sweep" x="122" y="-110" width="100" height="760" fill="#F0F6FC" opacity=".18" filter="url(#blur40)"/>
    <circle cx="939" cy="162" r="128" stroke="#58A6FF" stroke-opacity=".18"/>
    <circle class="orbit" cx="939" cy="162" r="166" stroke="#79C0FF" stroke-opacity=".28" stroke-width="1.4"/>
    <circle cx="985" cy="296" r="6" fill="#79C0FF" filter="url(#softGlow)"/>
    <circle class="particle" cx="180" cy="128" r="3" fill="#79C0FF"/>
    <circle class="particle" cx="246" cy="383" r="2.5" fill="#F0F6FC"/>
    <circle class="particle" cx="532" cy="118" r="2" fill="#58A6FF"/>
    <circle class="particle" cx="703" cy="407" r="3" fill="#79C0FF"/>
    <circle class="particle" cx="1084" cy="237" r="2.5" fill="#F0F6FC"/>
    <circle class="particle" cx="1009" cy="96" r="2" fill="#58A6FF"/>
  </g>
  <rect x="54.75" y="44.75" width="1090.5" height="430.5" rx="33.25" stroke="url(#border)" stroke-width="1.5"/>
  <rect x="74" y="64" width="1052" height="392" rx="24" stroke="#30363D" stroke-opacity=".7"/>
  <g transform="translate(102 94)">
    <rect x="0" y="0" width="134" height="36" rx="18" fill="#161B22" fill-opacity=".72" stroke="#30363D"/>
    <circle class="online" cx="23" cy="18" r="5" fill="#79C0FF" filter="url(#softGlow)"/>
    <text x="40" y="23" class="mono" fill="#F0F6FC" font-size="12" letter-spacing="1.6">ONLINE</text>
  </g>
  <text x="102" y="225" fill="#F0F6FC" font-size="74" font-weight="800" letter-spacing="4">KRISHNA AGARWAL</text>
  <text x="106" y="283" fill="#79C0FF" font-size="28" font-weight="600">Artificial Intelligence Engineer</text>
  <text x="108" y="325" class="mono" fill="#8B949E" font-size="16" letter-spacing="1.4">Building Intelligent Systems</text>
  <path d="M106 356H518" stroke="#30363D"/>
  <path d="M106 356H296" stroke="#58A6FF" stroke-linecap="round" filter="url(#softGlow)"/>
  <g transform="translate(818 338)">
    <rect width="248" height="76" rx="20" fill="#161B22" fill-opacity=".64" stroke="#30363D"/>
    <text x="24" y="33" class="mono" fill="#8B949E" font-size="12">SYSTEM MODE</text>
    <text x="24" y="57" fill="#F0F6FC" font-size="18" font-weight="700">AI Native Builder</text>
  </g>
</svg>
