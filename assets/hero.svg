<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Krishna Agarwal Hero Banner</title>
  <desc id="desc">Sleek dark mode banner for Krishna Agarwal, featuring glowing teal and indigo accents, minimal grid, and floating particles.</desc>
  <style>
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 0.65; transform: scale(1.08); }
    }
    @keyframes gridScroll {
      from { transform: translateY(0); }
      to { transform: translateY(40px); }
    }
    @keyframes floatParticle {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.4; }
      50% { transform: translateY(-15px) translateX(10px); opacity: 0.8; }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 0.4; r: 4; }
      50% { opacity: 1; r: 6.5; }
    }
    @keyframes shimmer {
      0% { stop-color: #818cf8; }
      50% { stop-color: #2dd4bf; }
      100% { stop-color: #818cf8; }
    }
    .grid { animation: gridScroll 12s linear infinite; }
    .glow-indigo { animation: pulseGlow 8s ease-in-out infinite; transform-origin: 20% 50%; }
    .glow-teal { animation: pulseGlow 10s ease-in-out infinite alternate; transform-origin: 80% 50%; }
    .particle { animation: floatParticle 8s ease-in-out infinite; }
    .particle:nth-child(2n) { animation-duration: 11s; animation-delay: -3s; }
    .particle:nth-child(3n) { animation-duration: 14s; animation-delay: -5s; }
    .status-dot { animation: pulseDot 2s ease-in-out infinite; }
    .shimmer-text { animation: shimmer 6s infinite; }
    
    text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .monospace {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
  </style>
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080710"/>
      <stop offset="0.5" stop-color="#0b0f19"/>
      <stop offset="1" stop-color="#080710"/>
    </linearGradient>

    <!-- Outer Border Gradient -->
    <linearGradient id="borderGradient" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f46e5" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#1e293b" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Glowing Background Gradients -->
    <radialGradient id="indigoGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 210) scale(400 250)">
      <stop stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 210) scale(400 250)">
      <stop stop-color="#14b8a6" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGradient" x1="0" y1="0" x2="650" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#e0e7ff"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
    
    <!-- Accent Line Gradient -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.7" stroke-opacity="0.6"/>
    </pattern>

    <!-- Soft Blur Filter for Glowing Elements -->
    <filter id="glowBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="1200" height="420" rx="16" fill="url(#bgGradient)"/>

  <!-- Scrollable Grid Backdrop -->
  <g class="grid">
    <rect x="0" y="-40" width="1200" height="500" fill="url(#gridPattern)"/>
  </g>

  <!-- Glowing Orbs (Soft and optimized) -->
  <circle class="glow-indigo" cx="250" cy="210" r="280" fill="url(#indigoGlow)" filter="url(#glowBlur)"/>
  <circle class="glow-teal" cx="950" cy="210" r="280" fill="url(#tealGlow)" filter="url(#glowBlur)"/>

  <!-- Subtle Floating Particles -->
  <g>
    <circle class="particle" cx="150" cy="100" r="2.5" fill="#818cf8"/>
    <circle class="particle" cx="450" cy="320" r="2" fill="#2dd4bf"/>
    <circle class="particle" cx="720" cy="80" r="3" fill="#e0e7ff"/>
    <circle class="particle" cx="1050" cy="280" r="2" fill="#818cf8"/>
    <circle class="particle" cx="880" cy="140" r="2.5" fill="#2dd4bf"/>
  </g>

  <!-- Main Profile Card / Info Section -->
  <g transform="translate(80, 0)">
    <!-- Status / Active Mode -->
    <g transform="translate(0, 85)">
      <rect width="210" height="30" rx="15" fill="#0f172a" fill-opacity="0.75" stroke="#1e293b" stroke-width="1"/>
      <circle class="status-dot" cx="20" cy="15" r="5" fill="#2dd4bf"/>
      <text x="35" y="19" class="monospace" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">SYSTEM: ACTIVE</text>
    </g>

    <!-- Name and Title -->
    <text x="0" y="190" fill="url(#textGradient)" font-size="64" font-weight="900" letter-spacing="-1">KRISHNA AGARWAL</text>
    <text x="3" y="235" fill="#38bdf8" font-size="22" font-weight="600" letter-spacing="0.5">AI Engineer &amp; Full Stack Developer</text>
    <text x="3" y="270" class="monospace" fill="#64748b" font-size="14" letter-spacing="1">building intelligent systems with clean design</text>

    <!-- Decorative Accent Line -->
    <path d="M3 295 H360" stroke="url(#accentLine)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Sleek Sidebar Information Card (Glassmorphism Effect) -->
  <g transform="translate(820, 110)">
    <!-- Card Base -->
    <rect width="300" height="200" rx="16" fill="#0b0f19" fill-opacity="0.65" stroke="#1e293b" stroke-width="1.5"/>
    
    <!-- Title / Label -->
    <text x="24" y="38" class="monospace" fill="#64748b" font-size="11" font-weight="600" letter-spacing="1.5">METRIC / INFO</text>
    
    <!-- Details -->
    <g transform="translate(24, 65)">
      <!-- Line 1: Region -->
      <text x="0" y="15" class="monospace" fill="#94a3b8" font-size="13">region :</text>
      <text x="90" y="15" fill="#f8fafc" font-size="14" font-weight="600">India</text>
      
      <!-- Line 2: Stack Focus -->
      <text x="0" y="45" class="monospace" fill="#94a3b8" font-size="13">focus  :</text>
      <text x="90" y="45" fill="#38bdf8" font-size="14" font-weight="600">AI / Web Platforms</text>

      <!-- Line 3: Hobbies / Motto -->
      <text x="0" y="75" class="monospace" fill="#94a3b8" font-size="13">motto  :</text>
      <text x="90" y="75" fill="#f8fafc" font-size="13" font-style="italic">Build with execution.</text>

      <!-- Line 4: Code status -->
      <text x="0" y="105" class="monospace" fill="#94a3b8" font-size="13">status :</text>
      <text x="90" y="105" fill="#2dd4bf" class="monospace" font-size="13" font-weight="600">ready_to_ship</text>
    </g>
  </g>

  <!-- Elegant Thin Border -->
  <rect x="0.75" y="0.75" width="1198.5" height="418.5" rx="15.25" stroke="url(#borderGradient)" stroke-width="1.5"/>
</svg>
