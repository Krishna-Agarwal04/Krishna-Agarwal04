<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Developer Console Terminal</title>
  <desc id="desc">Animated terminal window displaying a mock Python AI pipeline initialization for Krishna Agarwal.</desc>
  <style>
    @keyframes cursorBlink {
      0%, 45% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes typingText {
      from { stroke-dashoffset: 400; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes lineFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .cursor { animation: cursorBlink 1.1s step-end infinite; }
    .code-line { animation: lineFadeIn 0.8s ease-out forwards; opacity: 0; }
    .line-1 { animation-delay: 0.2s; }
    .line-2 { animation-delay: 0.6s; }
    .line-3 { animation-delay: 1.0s; }
    .line-4 { animation-delay: 1.4s; }
    .line-5 { animation-delay: 1.8s; }
    .line-6 { animation-delay: 2.2s; }
    .line-7 { animation-delay: 2.6s; }
    .line-8 { animation-delay: 3.0s; }
    .line-9 { animation-delay: 3.4s; }
    .line-10 { animation-delay: 3.8s; }
    .line-11 { animation-delay: 4.2s; }
    
    text {
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 14px;
    }
    .keyword { fill: #c792ea; font-weight: bold; }
    .class-name { fill: #f8c555; }
    .function-call { fill: #82aaff; }
    .string { fill: #c3e88d; }
    .comment { fill: #546e7a; font-style: italic; }
    .variable { fill: #ff5370; }
    .property { fill: #f07178; }
    .operator { fill: #89ddff; }
    .number { fill: #f78c6c; }
    .normal { fill: #eeffff; }
    .prompt { fill: #c3e88d; font-weight: bold; }
    .terminal-out { fill: #89ddff; }
  </style>
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080710"/>
      <stop offset="0.5" stop-color="#0c0e17"/>
      <stop offset="1" stop-color="#080710"/>
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#1e293b" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0.5"/>
    </linearGradient>
    
    <!-- Shadow filter for window depth -->
    <filter id="windowShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Base Grid/Noise Surface (Matches Hero) -->
  <rect width="1200" height="420" rx="16" fill="url(#bgGrad)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="418.5" rx="15.25" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Terminal Window Container -->
  <g transform="translate(60, 40)" filter="url(#windowShadow)">
    <!-- Terminal Window Frame -->
    <rect width="1080" height="340" rx="12" fill="#0b0f19" fill-opacity="0.85" stroke="#1e293b" stroke-width="1"/>
    
    <!-- Header Bar -->
    <path d="M0 12C0 5.37258 5.37258 0 12 0H1068C1074.63 0 1080 5.37258 1080 12V34H0V12Z" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
    
    <!-- Window Control Buttons (Mac-Style Monochromatic/Glow) -->
    <circle cx="20" cy="17" r="6" fill="#f87171" fill-opacity="0.9"/>
    <circle cx="40" cy="17" r="6" fill="#fbbf24" fill-opacity="0.9"/>
    <circle cx="60" cy="17" r="6" fill="#34d399" fill-opacity="0.9"/>
    
    <!-- Console Title -->
    <text x="540" y="22" fill="#64748b" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="1">krishna@core-system: ~/profile</text>
    
    <!-- Code Editor Content -->
    <g transform="translate(30, 60)">
      <!-- Line 1 -->
      <g class="code-line line-1">
        <text x="0" y="20">
          <tspan class="keyword">import</tspan>
          <tspan class="normal"> developer </tspan>
          <tspan class="keyword">from</tspan>
          <tspan class="normal"> </tspan>
          <tspan class="string">'krishna'</tspan>
        </text>
      </g>

      <!-- Line 2 -->
      <g class="code-line line-2">
        <text x="0" y="45">
          <tspan class="comment"># Define profile credentials and goals</tspan>
        </text>
      </g>

      <!-- Line 3 -->
      <g class="code-line line-3">
        <text x="0" y="70">
          <tspan class="variable">eng</tspan>
          <tspan class="operator"> = </tspan>
          <tspan class="normal">developer.</tspan>
          <tspan class="function-call">Engineer</tspan>
          <tspan class="normal">(</tspan>
        </text>
      </g>

      <!-- Line 4 -->
      <g class="code-line line-4">
        <text x="24" y="95">
          <tspan class="property">name</tspan>
          <tspan class="operator">=</tspan>
          <tspan class="string">"Krishna Agarwal"</tspan>
          <tspan class="normal">,</tspan>
        </text>
      </g>

      <!-- Line 5 -->
      <g class="code-line line-5">
        <text x="24" y="120">
          <tspan class="property">role</tspan>
          <tspan class="operator">=</tspan>
          <tspan class="string">"Full-Stack Developer"</tspan>
          <tspan class="normal">,</tspan>
        </text>
      </g>

      <!-- Line 6 -->
      <g class="code-line line-6">
        <text x="24" y="145">
          <tspan class="property">capabilities</tspan>
          <tspan class="operator">=</tspan>
          <tspan class="normal">[</tspan>
          <tspan class="string">"Python"</tspan>
          <tspan class="normal">, </tspan>
          <tspan class="string">"React"</tspan>
          <tspan class="normal">, </tspan>
          <tspan class="string">"Node.js"</tspan>
          <tspan class="normal">]</tspan>
        </text>
      </g>

      <!-- Line 7 -->
      <g class="code-line line-7">
        <text x="0" y="170">
          <tspan class="normal">)</tspan>
        </text>
      </g>

      <!-- Line 8 -->
      <g class="code-line line-8">
        <text x="0" y="200">
          <tspan class="variable">eng</tspan>
          <tspan class="normal">.</tspan>
          <tspan class="function-call">initialize_system</tspan>
          <tspan class="normal">(</tspan>
          <tspan class="property">mode</tspan>
          <tspan class="operator">=</tspan>
          <tspan class="string">"production"</tspan>
          <tspan class="normal">)</tspan>
        </text>
      </g>

      <!-- Horizontal Divider for Terminal Output -->
      <line x1="-10" y1="220" x2="1030" y2="220" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 6"/>

      <!-- Terminal Prompt and Output Simulation -->
      <!-- Line 9 -->
      <g class="code-line line-9" transform="translate(0, 245)">
        <text x="0" y="5">
          <tspan class="prompt">$ </tspan>
          <tspan class="normal">python profile_run.py</tspan>
        </text>
      </g>

      <!-- Line 10 -->
      <g class="code-line line-10" transform="translate(0, 270)">
        <text x="0" y="5">
          <tspan class="terminal-out">[info] Initializing development environment variables...</tspan>
        </text>
      </g>

      <!-- Line 11 -->
      <g class="code-line line-11" transform="translate(0, 295)">
        <text x="0" y="5">
          <tspan class="string">✓ System Ready. Core components online and fully responsive.</tspan>
        </text>
        <rect class="cursor" x="515" y="-9" width="8" height="17" fill="#2dd4bf" rx="1"/>
      </g>
    </g>
  </g>
</svg>
