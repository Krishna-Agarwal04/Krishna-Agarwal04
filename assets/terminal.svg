<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Compact engineering terminal</title>
  <desc id="desc">A compact animated terminal card with gradients, blur, glow, grid, floating objects, noise, and aurora effect.</desc>
  <style>
    @keyframes cursor { 0%,45% { opacity: 1; } 46%,100% { opacity: 0; } }
    @keyframes aurora { 0%,100% { transform: translateX(-30px); opacity: .3; } 50% { transform: translateX(34px); opacity: .68; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes dash { to { stroke-dashoffset: -120; } }
    .cursor { animation: cursor 1.1s step-end infinite; }
    .aurora { animation: aurora 8s ease-in-out infinite; }
    .particle { animation: float 7s ease-in-out infinite; }
    .dash { stroke-dasharray: 9 15; animation: dash 8s linear infinite; }
    text { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset=".5" stop-color="#161B22"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="border" x1="90" y1="56" x2="1110" y2="364" gradientUnits="userSpaceOnUse">
      <stop stop-color="#79C0FF" stop-opacity=".85"/>
      <stop offset=".45" stop-color="#30363D"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity=".7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(652 226) scale(470 150)">
      <stop stop-color="#58A6FF" stop-opacity=".28"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" stroke="#30363D" stroke-opacity=".24"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="3" seed="11"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .06"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="28" filter="url(#noise)" opacity=".65"/>
  <ellipse class="aurora" cx="610" cy="222" rx="470" ry="150" fill="url(#glow)" filter="url(#blur)"/>
  <rect x="90" y="56" width="1020" height="308" rx="26" fill="#161B22" fill-opacity=".72" stroke="url(#border)" stroke-width="1.4"/>
  <path class="dash" d="M136 128H1064" stroke="#30363D" stroke-linecap="round"/>
  <circle cx="128" cy="93" r="7" fill="#30363D"/>
  <circle cx="152" cy="93" r="7" fill="#30363D"/>
  <circle cx="176" cy="93" r="7" fill="#79C0FF" fill-opacity=".8"/>
  <text x="136" y="162" fill="#79C0FF" font-size="16">$ profile.init()</text>
  <text x="136" y="199" fill="#F0F6FC" font-size="18">role: Artificial Intelligence Engineer</text>
  <text x="136" y="235" fill="#F0F6FC" font-size="18">stack: AI systems, full stack products, cloud deployment</text>
  <text x="136" y="271" fill="#8B949E" font-size="18">principle: ship clean interfaces around powerful models</text>
  <text x="136" y="307" fill="#79C0FF" font-size="16">$ build --with clarity</text>
  <rect class="cursor" x="342" y="292" width="10" height="22" rx="2" fill="#79C0FF"/>
  <circle class="particle" cx="975" cy="144" r="3" fill="#79C0FF"/>
  <circle class="particle" cx="1012" cy="278" r="2.5" fill="#F0F6FC"/>
  <rect x=".75" y=".75" width="1198.5" height="418.5" rx="27.25" stroke="#30363D" stroke-opacity=".88" stroke-width="1.5"/>
</svg>
