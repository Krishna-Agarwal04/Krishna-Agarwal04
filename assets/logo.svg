<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Krishna Agarwal logo</title>
  <desc id="desc">Animated KA monogram with dark glass, gradient border, grid, particles, glow, and noise.</desc>
  <style>
    @keyframes spinDash { to { stroke-dashoffset: -220; } }
    @keyframes glow { 0%,100% { opacity: .32; transform: scale(.96); } 50% { opacity: .78; transform: scale(1.04); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    .ring { stroke-dasharray: 20 18; animation: spinDash 8s linear infinite; }
    .aura { transform-origin: 110px 110px; animation: glow 4.6s ease-in-out infinite; }
    .particle { animation: float 5s ease-in-out infinite; }
    text { font-family: Inter, "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
  <defs>
    <linearGradient id="bg" x1="22" y1="18" x2="198" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#161B22"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="border" x1="24" y1="20" x2="196" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#79C0FF"/>
      <stop offset=".48" stop-color="#30363D"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <radialGradient id="auraFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(110 110) scale(88)">
      <stop stop-color="#58A6FF" stop-opacity=".48"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" stroke="#30363D" stroke-opacity=".34"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="13"/></filter>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".95" numOctaves="3" seed="4"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .07"/></feComponentTransfer>
    </filter>
  </defs>
  <rect x="18" y="18" width="184" height="184" rx="44" fill="url(#bg)"/>
  <rect x="18" y="18" width="184" height="184" rx="44" fill="url(#grid)"/>
  <rect x="18" y="18" width="184" height="184" rx="44" filter="url(#noise)" opacity=".7"/>
  <circle class="aura" cx="110" cy="110" r="80" fill="url(#auraFill)" filter="url(#blur)"/>
  <rect x="18.8" y="18.8" width="182.4" height="182.4" rx="43.2" stroke="url(#border)" stroke-width="1.6"/>
  <circle class="ring" cx="110" cy="110" r="70" stroke="#79C0FF" stroke-opacity=".42" stroke-width="1.6"/>
  <circle class="particle" cx="68" cy="61" r="3" fill="#79C0FF"/>
  <circle class="particle" cx="158" cy="153" r="3" fill="#F0F6FC"/>
  <text x="110" y="128" fill="#F0F6FC" font-size="52" font-weight="850" letter-spacing="-1" text-anchor="middle">KA</text>
</svg>
