<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech stack glass cards</title>
  <desc id="desc">Premium glassmorphism technology category cards with animated glow, grid, particles, gradient borders, noise, and aurora effect.</desc>
  <style>
    @keyframes aurora { 0%,100% { transform: translateX(-22px); opacity: .34; } 50% { transform: translateX(22px); opacity: .72; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes dash { to { stroke-dashoffset: -120; } }
    .aurora { animation: aurora 8s ease-in-out infinite; }
    .card { animation: float 7s ease-in-out infinite; }
    .card:nth-of-type(2) { animation-delay: -2s; }
    .card:nth-of-type(3) { animation-delay: -4s; }
    .ring { stroke-dasharray: 8 12; animation: dash 7s linear infinite; }
    text { font-family: Inter, "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset=".5" stop-color="#161B22"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="border" x1="96" y1="104" x2="1104" y2="304" gradientUnits="userSpaceOnUse">
      <stop stop-color="#79C0FF" stop-opacity=".75"/>
      <stop offset=".5" stop-color="#30363D"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity=".76"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 190) scale(520 150)">
      <stop stop-color="#58A6FF" stop-opacity=".34"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#30363D" stroke-opacity=".24"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="3" seed="27"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .06"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="380" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="380" rx="28" filter="url(#noise)" opacity=".68"/>
  <ellipse class="aurora" cx="600" cy="190" rx="520" ry="150" fill="url(#glow)" filter="url(#blur)"/>
  <text x="600" y="69" fill="#F0F6FC" font-size="29" font-weight="780" text-anchor="middle">Technology Surface</text>
  <text x="600" y="99" class="mono" fill="#8B949E" font-size="12" letter-spacing="1.4" text-anchor="middle">INTELLIGENCE / PRODUCT ENGINEERING / SYSTEMS</text>
  <g transform="translate(96 134)">
    <g class="card">
      <rect width="304" height="150" rx="22" fill="#161B22" fill-opacity=".72" stroke="url(#border)"/>
      <circle cx="60" cy="66" r="30" fill="#58A6FF" fill-opacity=".1" stroke="#79C0FF"/>
      <path d="M48 66H72M60 54V78M50 56L70 76M70 56L50 76" stroke="#79C0FF" stroke-width="2" stroke-linecap="round"/>
      <circle class="ring" cx="60" cy="66" r="43" stroke="#58A6FF" stroke-opacity=".32"/>
      <text x="116" y="61" fill="#F0F6FC" font-size="21" font-weight="740">Intelligence</text>
      <text x="116" y="88" class="mono" fill="#8B949E" font-size="11">PYTHON / ML / VISION</text>
      <text x="28" y="124" fill="#79C0FF" font-size="13">Models that become usable products.</text>
    </g>
    <g class="card" transform="translate(352 0)">
      <rect width="304" height="150" rx="22" fill="#161B22" fill-opacity=".72" stroke="url(#border)"/>
      <circle cx="60" cy="66" r="30" fill="#58A6FF" fill-opacity=".1" stroke="#79C0FF"/>
      <rect x="44" y="52" width="32" height="28" rx="6" stroke="#79C0FF" stroke-width="2"/>
      <path d="M50 60H70M50 70H62" stroke="#79C0FF" stroke-width="2" stroke-linecap="round"/>
      <circle class="ring" cx="60" cy="66" r="43" stroke="#58A6FF" stroke-opacity=".32"/>
      <text x="116" y="61" fill="#F0F6FC" font-size="21" font-weight="740">Product</text>
      <text x="116" y="88" class="mono" fill="#8B949E" font-size="11">REACT / NEXT / NODE</text>
      <text x="28" y="124" fill="#79C0FF" font-size="13">Interfaces that feel calm and fast.</text>
    </g>
    <g class="card" transform="translate(704 0)">
      <rect width="304" height="150" rx="22" fill="#161B22" fill-opacity=".72" stroke="url(#border)"/>
      <circle cx="60" cy="66" r="30" fill="#58A6FF" fill-opacity=".1" stroke="#79C0FF"/>
      <path d="M44 73L60 52L76 73H44Z" stroke="#79C0FF" stroke-width="2" stroke-linejoin="round"/>
      <path d="M48 79H72" stroke="#79C0FF" stroke-width="2" stroke-linecap="round"/>
      <circle class="ring" cx="60" cy="66" r="43" stroke="#58A6FF" stroke-opacity=".32"/>
      <text x="116" y="61" fill="#F0F6FC" font-size="21" font-weight="740">Systems</text>
      <text x="116" y="88" class="mono" fill="#8B949E" font-size="11">CLOUD / DATA / DEVOPS</text>
      <text x="28" y="124" fill="#79C0FF" font-size="13">Infrastructure with room to scale.</text>
    </g>
  </g>
  <circle cx="188" cy="82" r="2.5" fill="#79C0FF"/>
  <circle cx="990" cy="305" r="2.5" fill="#F0F6FC"/>
  <rect x=".75" y=".75" width="1198.5" height="378.5" rx="27.25" stroke="#30363D" stroke-opacity=".88" stroke-width="1.5"/>
</svg>
