<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated system grid</title>
  <desc id="desc">Futuristic animated grid with orbits, glow, gradients, particles, and noise texture.</desc>
  <style>
    @keyframes pan { from { transform: translate(0,0); } to { transform: translate(44px,44px); } }
    @keyframes orbit { to { stroke-dashoffset: -180; } }
    @keyframes node { 0%,100% { opacity: .42; transform: scale(.96); } 50% { opacity: 1; transform: scale(1.08); } }
    @keyframes sweep { from { transform: translateX(-280px); } to { transform: translateX(1120px); } }
    .grid { animation: pan 9s linear infinite; }
    .orbit { stroke-dasharray: 12 18; animation: orbit 8s linear infinite; }
    .node { transform-box: fill-box; transform-origin: center; animation: node 4s ease-in-out infinite; }
    .sweep { animation: sweep 7s ease-in-out infinite; }
    text { font-family: Inter, "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset=".5" stop-color="#161B22"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 180) scale(430 150)">
      <stop stop-color="#79C0FF" stop-opacity=".28"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridPattern" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#30363D" stroke-opacity=".28"/>
      <circle cx="0" cy="0" r="1.2" fill="#58A6FF" fill-opacity=".34"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".74" numOctaves="3" seed="14"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .055"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <g class="grid"><rect x="-88" y="-88" width="1376" height="536" fill="url(#gridPattern)"/></g>
  <rect width="1200" height="360" rx="28" filter="url(#noise)" opacity=".68"/>
  <ellipse cx="600" cy="180" rx="430" ry="150" fill="url(#glow)" filter="url(#blur)"/>
  <rect class="sweep" x="0" y="45" width="80" height="270" fill="#F0F6FC" opacity=".12" filter="url(#blur)"/>
  <circle cx="600" cy="180" r="104" stroke="#30363D"/>
  <circle class="orbit" cx="600" cy="180" r="142" stroke="#79C0FF" stroke-opacity=".45" stroke-width="1.6"/>
  <circle class="orbit" cx="600" cy="180" r="190" stroke="#58A6FF" stroke-opacity=".22" stroke-width="1.4"/>
  <g class="node">
    <circle cx="600" cy="180" r="46" fill="#161B22" stroke="#30363D"/>
    <circle cx="600" cy="180" r="26" fill="#58A6FF" fill-opacity=".1" stroke="#79C0FF"/>
  </g>
  <circle class="node" cx="412" cy="126" r="8" fill="#79C0FF"/>
  <circle class="node" cx="789" cy="235" r="7" fill="#58A6FF"/>
  <circle class="node" cx="754" cy="95" r="5" fill="#F0F6FC"/>
  <text x="600" y="64" fill="#F0F6FC" font-size="24" font-weight="760" text-anchor="middle">Composable Engineering Surface</text>
  <text x="600" y="304" class="mono" fill="#8B949E" font-size="12" letter-spacing="1.4" text-anchor="middle">MODEL / API / INTERFACE / DEPLOYMENT / OBSERVABILITY</text>
  <rect x=".75" y=".75" width="1198.5" height="358.5" rx="27.25" stroke="#30363D" stroke-opacity=".9" stroke-width="1.5"/>
</svg>
