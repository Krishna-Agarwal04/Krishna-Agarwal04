<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated aurora background divider</title>
  <desc id="desc">Dark glass divider with animated grid, glow, particles, and subtle noise texture.</desc>
  <style>
    @keyframes drift { from { transform: translateX(-60px); } to { transform: translateX(60px); } }
    @keyframes glow { 0%,100% { opacity: .35; } 50% { opacity: .86; } }
    @keyframes rise { 0%,100% { transform: translateY(0); opacity: .35; } 50% { transform: translateY(-12px); opacity: .9; } }
    @keyframes dash { to { stroke-dashoffset: -96; } }
    .grid { animation: drift 16s ease-in-out infinite alternate; }
    .glow { animation: glow 7s ease-in-out infinite; }
    .particle { animation: rise 6s ease-in-out infinite; }
    .dash { stroke-dasharray: 8 14; animation: dash 7s linear infinite; }
    text { font-family: Inter, "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset=".48" stop-color="#161B22"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="aura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(594 135) scale(520 136)">
      <stop stop-color="#58A6FF" stop-opacity=".46"/>
      <stop offset=".45" stop-color="#79C0FF" stop-opacity=".16"/>
      <stop offset="1" stop-color="#79C0FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="176" y1="140" x2="1024" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset=".5" stop-color="#79C0FF"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#30363D" stroke-opacity=".32"/>
    </pattern>
    <filter id="blur" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="3" seed="18"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .06"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="280" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="280" rx="28" filter="url(#noise)" opacity=".65"/>
  <g class="grid">
    <rect x="-120" y="-40" width="1440" height="360" fill="url(#grid)"/>
  </g>
  <ellipse class="glow" cx="600" cy="140" rx="480" ry="92" fill="url(#aura)" filter="url(#blur)"/>
  <path class="dash" d="M176 140H1024" stroke="url(#line)" stroke-width="2" stroke-linecap="round"/>
  <circle class="particle" cx="237" cy="88" r="3" fill="#79C0FF"/>
  <circle class="particle" cx="378" cy="191" r="2" fill="#F0F6FC"/>
  <circle class="particle" cx="764" cy="82" r="2.5" fill="#58A6FF"/>
  <circle class="particle" cx="930" cy="196" r="3" fill="#79C0FF"/>
  <text x="600" y="127" fill="#F0F6FC" font-size="30" font-weight="760" text-anchor="middle">Intelligent Systems. Clean Interfaces. Reliable Infrastructure.</text>
  <text x="600" y="164" class="mono" fill="#8B949E" font-size="13" letter-spacing="1.6" text-anchor="middle">AI ENGINEERING / FULL STACK DEVELOPMENT / CLOUD READY PRODUCTS</text>
  <rect x=".75" y=".75" width="1198.5" height="278.5" rx="27.25" stroke="#30363D" stroke-opacity=".9" stroke-width="1.5"/>
</svg>
