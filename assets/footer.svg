<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated footer wave</title>
  <desc id="desc">Minimal dark footer with animated waves, glow, grid, particles, and noise.</desc>
  <style>
    @keyframes wave { from { transform: translateX(0); } to { transform: translateX(-160px); } }
    @keyframes pulse { 0%,100% { opacity: .28; } 50% { opacity: .72; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .wave-a { animation: wave 9s linear infinite; }
    .wave-b { animation: wave 14s linear infinite reverse; }
    .glow { animation: pulse 5s ease-in-out infinite; }
    .particle { animation: float 7s ease-in-out infinite; }
    text { font-family: Inter, "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="1" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="waveLine" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset=".5" stop-color="#79C0FF" stop-opacity=".95"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 188) scale(520 94)">
      <stop stop-color="#58A6FF" stop-opacity=".38"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#30363D" stroke-opacity=".22"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".7" numOctaves="3" seed="24"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .06"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="260" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="260" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="260" rx="28" filter="url(#noise)" opacity=".7"/>
  <ellipse class="glow" cx="600" cy="188" rx="520" ry="94" fill="url(#glow)" filter="url(#blur)"/>
  <g class="wave-a">
    <path d="M-160 166C-80 126 0 126 80 166C160 206 240 206 320 166C400 126 480 126 560 166C640 206 720 206 800 166C880 126 960 126 1040 166C1120 206 1200 206 1280 166C1360 126 1440 126 1520 166" stroke="url(#waveLine)" stroke-width="2"/>
  </g>
  <g class="wave-b" opacity=".55">
    <path d="M-160 190C-80 158 0 158 80 190C160 222 240 222 320 190C400 158 480 158 560 190C640 222 720 222 800 190C880 158 960 158 1040 190C1120 222 1200 222 1280 190C1360 158 1440 158 1520 190" stroke="url(#waveLine)" stroke-width="1.5"/>
  </g>
  <circle class="particle" cx="238" cy="78" r="2.5" fill="#79C0FF"/>
  <circle class="particle" cx="924" cy="92" r="2.5" fill="#F0F6FC"/>
  <text x="600" y="91" fill="#F0F6FC" font-size="26" font-weight="760" text-anchor="middle">Designed for intelligent software</text>
  <text x="600" y="123" class="mono" fill="#8B949E" font-size="12" letter-spacing="1.6" text-anchor="middle">KRISHNA AGARWAL / INDIA</text>
  <rect x=".75" y=".75" width="1198.5" height="258.5" rx="27.25" stroke="#30363D" stroke-opacity=".86" stroke-width="1.5"/>
</svg>
