<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Learning cards</title>
  <desc id="desc">Elegant animated learning cards for AI, machine learning, deep learning, backend, frontend, and cloud.</desc>
  <style>
    @keyframes aurora { 0%,100% { transform: translateX(-28px); opacity: .35; } 50% { transform: translateX(28px); opacity: .7; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes dash { to { stroke-dashoffset: -128; } }
    .aurora { animation: aurora 9s ease-in-out infinite; }
    .card { animation: float 7s ease-in-out infinite; }
    .card:nth-of-type(2n) { animation-delay: -2.2s; }
    .dash { stroke-dasharray: 10 14; animation: dash 8s linear infinite; }
    text { font-family: Inter, "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset=".5" stop-color="#101722"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="cardBorder" x1="116" y1="120" x2="1084" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#79C0FF" stop-opacity=".65"/>
      <stop offset=".5" stop-color="#30363D"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity=".7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 206) scale(520 170)">
      <stop stop-color="#58A6FF" stop-opacity=".36"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#30363D" stroke-opacity=".24"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".82" numOctaves="3" seed="19"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .065"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="28" filter="url(#noise)" opacity=".68"/>
  <ellipse class="aurora" cx="600" cy="206" rx="520" ry="170" fill="url(#glow)" filter="url(#blur)"/>
  <text x="600" y="70" fill="#F0F6FC" font-size="28" font-weight="780" text-anchor="middle">Current Learning Focus</text>
  <text x="600" y="99" class="mono" fill="#8B949E" font-size="12" letter-spacing="1.5" text-anchor="middle">DEPTH OVER NOISE / PRINCIPLES OVER TRENDS</text>
  <g transform="translate(106 136)">
    <g class="card">
      <rect width="300" height="92" rx="18" fill="#161B22" fill-opacity=".74" stroke="url(#cardBorder)"/>
      <circle cx="42" cy="46" r="16" fill="#58A6FF" fill-opacity=".12" stroke="#79C0FF"/>
      <text x="74" y="43" fill="#F0F6FC" font-size="18" font-weight="720">Artificial Intelligence</text>
      <text x="74" y="65" class="mono" fill="#8B949E" font-size="11">AGENTS / REASONING</text>
    </g>
    <g class="card" transform="translate(340 0)">
      <rect width="300" height="92" rx="18" fill="#161B22" fill-opacity=".74" stroke="url(#cardBorder)"/>
      <circle cx="42" cy="46" r="16" fill="#58A6FF" fill-opacity=".12" stroke="#79C0FF"/>
      <text x="74" y="43" fill="#F0F6FC" font-size="18" font-weight="720">Machine Learning</text>
      <text x="74" y="65" class="mono" fill="#8B949E" font-size="11">FEATURES / EVALUATION</text>
    </g>
    <g class="card" transform="translate(680 0)">
      <rect width="300" height="92" rx="18" fill="#161B22" fill-opacity=".74" stroke="url(#cardBorder)"/>
      <circle cx="42" cy="46" r="16" fill="#58A6FF" fill-opacity=".12" stroke="#79C0FF"/>
      <text x="74" y="43" fill="#F0F6FC" font-size="18" font-weight="720">Deep Learning</text>
      <text x="74" y="65" class="mono" fill="#8B949E" font-size="11">MODELS / TRAINING</text>
    </g>
    <g class="card" transform="translate(0 120)">
      <rect width="300" height="92" rx="18" fill="#161B22" fill-opacity=".74" stroke="url(#cardBorder)"/>
      <circle cx="42" cy="46" r="16" fill="#58A6FF" fill-opacity=".12" stroke="#79C0FF"/>
      <text x="74" y="43" fill="#F0F6FC" font-size="18" font-weight="720">Backend</text>
      <text x="74" y="65" class="mono" fill="#8B949E" font-size="11">APIS / DATA / SCALE</text>
    </g>
    <g class="card" transform="translate(340 120)">
      <rect width="300" height="92" rx="18" fill="#161B22" fill-opacity=".74" stroke="url(#cardBorder)"/>
      <circle cx="42" cy="46" r="16" fill="#58A6FF" fill-opacity=".12" stroke="#79C0FF"/>
      <text x="74" y="43" fill="#F0F6FC" font-size="18" font-weight="720">Frontend</text>
      <text x="74" y="65" class="mono" fill="#8B949E" font-size="11">PRODUCT / INTERACTION</text>
    </g>
    <g class="card" transform="translate(680 120)">
      <rect width="300" height="92" rx="18" fill="#161B22" fill-opacity=".74" stroke="url(#cardBorder)"/>
      <circle cx="42" cy="46" r="16" fill="#58A6FF" fill-opacity=".12" stroke="#79C0FF"/>
      <text x="74" y="43" fill="#F0F6FC" font-size="18" font-weight="720">Cloud</text>
      <text x="74" y="65" class="mono" fill="#8B949E" font-size="11">DEPLOYMENT / RELIABILITY</text>
    </g>
  </g>
  <path class="dash" d="M120 362H1080" stroke="#79C0FF" stroke-opacity=".3" stroke-linecap="round"/>
  <rect x=".75" y=".75" width="1198.5" height="418.5" rx="27.25" stroke="#30363D" stroke-opacity=".88" stroke-width="1.5"/>
</svg>
